<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Z9DS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#000;
color:#fff;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.center{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

h1{
font-size:70px;
letter-spacing:4px;
text-shadow:0 0 15px rgba(255,255,255,0.5);
}

.sub{
margin-top:6px;
font-size:12px;
opacity:0.5;
letter-spacing:3px;
}

.links{
margin-top:40px;
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
}

.links a{
padding:12px 24px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.3);
background:rgba(255,255,255,0.1);
color:#fff;
text-decoration:none;
transition:0.2s;
}

.links a:hover{
transform:translateY(-3px);
background:rgba(255,255,255,0.2);
box-shadow:0 0 25px rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="center">
<h1>Z9DS</h1>
<p class="sub">ZOT</p>

<div class="links">
<a href="https://www.roblox.com/users/4377530875/profile" target="_blank">Roblox</a>
<a href="https://discord.com/users/1261427193746292848" target="_blank">Discord</a>
<a href="#">More</a>
</div>
</div>

<script>
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

let particles=[];
let cx,cy;

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
cx=canvas.width/2;
cy=canvas.height/2;
}

function create(){
particles=[];
let count=1200;

for(let i=0;i<count;i++){
particles.push({
angle:Math.random()*Math.PI*2,
radius:Math.random()*600,
speed:Math.random()*0.002+0.0005,
size:1
});
}
}

function draw(){
ctx.fillStyle="#000";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

particles.forEach(p=>{
p.angle+=p.speed;
let x=cx+Math.cos(p.angle)*p.radius;
let y=cy+Math.sin(p.angle)*p.radius;
ctx.fillRect(x,y,p.size,p.size);
});

requestAnimationFrame(draw);
}

resize();
create();
draw();

addEventListener("resize",()=>{
resize();
create();
});
</script>

</body>
</html>
