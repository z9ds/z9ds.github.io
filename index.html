<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>z9ds</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

html,body{
width:100%;
height:100%;
background:#000;
color:#fff;
cursor:none;
overflow:hidden;
}

#gate{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#000;
z-index:10;
transition:opacity .8s ease;
}

#gate span{
font-size:14px;
letter-spacing:4px;
opacity:0.6;
transition:0.25s;
cursor:pointer;
}

#gate span:hover{
opacity:1;
}

.center{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.95);
text-align:center;
opacity:0;
transition:opacity .8s ease, transform .8s ease;
}

.center.show{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

h1{
font-size:70px;
letter-spacing:4px;
text-shadow:0 0 15px rgba(255,255,255,0.7);
}

.sub{
margin-top:6px;
font-size:12px;
opacity:0.5;
letter-spacing:3px;
}

.links{
margin-top:40px;
display:flex;
gap:18px;
justify-content:center;
}

.links a{
width:55px;
height:55px;
display:flex;
align-items:center;
justify-content:center;
border-radius:14px;
border:1px solid rgba(255,255,255,0.25);
background:rgba(255,255,255,0.08);
transition:0.25s;
}

.links a:hover{
transform:translateY(-4px) scale(1.05);
background:rgba(255,255,255,0.16);
box-shadow:0 0 30px rgba(255,255,255,0.25);
}

.links img{
width:22px;
filter:invert(1);
}

.cursor{
position:fixed;
width:12px;
height:12px;
border-radius:50%;
background:#fff;
pointer-events:none;
z-index:9999;
transform:translate(-50%,-50%);
box-shadow:
0 0 10px rgba(255,255,255,1),
0 0 25px rgba(255,255,255,0.7),
0 0 50px rgba(255,255,255,0.4);
}
.empty-btn{
position:fixed;
bottom:20px;
right:20px;
width:50px;
height:50px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.25);
background:rgba(255,255,255,0.08);
transition:0.25s;
opacity:0;
}

.empty-btn.show{
opacity:1;
}

.empty-btn:hover{
background:rgba(255,255,255,0.16);
box-shadow:0 0 25px rgba(255,255,255,0.25);
transform:scale(1.05);
}
</style>
</head>

<body>

<div id="gate">
<span>CLICK</span>
</div>

<div class="center" id="main">
<h1>Z9DS</h1>
<p class="sub">ZOT</p>

<div class="links">
<a href="https://discord.com/users/1261427193746292848" target="_blank">
<img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/discord.svg">
</a>

<a href="https://pin.it/6YAgb4suq" target="_blank">
<img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/pinterest.svg">
</a>
</div>
</div>

<div class="cursor" id="cursor"></div>
<div class="empty-btn" id="btn"></div>

<script>
const cursor = document.getElementById("cursor");
const gate = document.getElementById("gate");
const main = document.getElementById("main");
const btn = document.getElementById("btn");

window.addEventListener("mousemove", e=>{
cursor.style.left = e.clientX + "px";
cursor.style.top = e.clientY + "px";
});

gate.addEventListener("click", ()=>{
gate.style.opacity = "0";

setTimeout(()=>{
gate.style.display = "none";
main.classList.add("show");
btn.classList.add("show");
}, 600);
});
</script>

</body>
</html>
